<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#ff24e4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00F0FF" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0A0C10" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
  <g filter="url(#shadow)">
    <!-- Stylized "C" for Creator Hub with Scheduler bars -->
    <path d="M 360 160 C 280 100, 160 160, 160 256 C 160 352, 280 412, 360 352" fill="none" stroke="url(#neonGlow)" stroke-width="48" stroke-linecap="round"/>
    <rect x="240" y="220" width="120" height="32" rx="16" fill="#00F0FF" />
    <rect x="200" y="280" width="160" height="32" rx="16" fill="#ff24e4" />
  </g>
</svg>
